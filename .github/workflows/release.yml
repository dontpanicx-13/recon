name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            exe: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            exe: ""
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            exe: ""
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            exe: ""
          - goos: windows
            goarch: amd64
            archive: zip
            exe: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X main.name=recon -X main.version=${{ github.ref_name }}" -o "dist/recon${{ matrix.exe }}" ./cmd/recon

      - name: Package
        run: |
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -9 "recon_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "recon${{ matrix.exe }}"
          else
            tar -czf "recon_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" "recon${{ matrix.exe }}"
          fi
          rm -f "recon${{ matrix.exe }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recon_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/recon_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
